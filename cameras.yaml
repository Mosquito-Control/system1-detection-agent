# 12-camera TST rig from system4-unity-simulation commit 663f3d2.
# azimuth/elevation/FoV per cam come straight from that commit's authoritative
# table (bearing→azimuth, tilt→elevation, vfov/hfov verbatim). cam_NN maps to
# Unity camN-1 (cam_01 ↔ cam0, …, cam_12 ↔ cam11), preserving the same
# convention as Orgs/system2-positioning-engine/cameras.yaml so S1 cam_ids
# match S2's camera registry exactly.
#
# stream_url uses MediaMTX path /camN (Unity's published path; deploy/mediamtx).
# Regenerate from live Unity UDP GT when the rig changes:
#   python -m tools.gen_camera_configs
cameras:
- cam_id: cam_01
  stream_url: rtsp://host.docker.internal:8554/cam0
  azimuth_deg: 180.0
  elevation_deg: 26.5
  hfov_deg: 91.5
  vfov_deg: 60.0
